services:
  postgres:
    image: postgres:18-alpine
    container_name: fellahconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fellahconnect
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fellah-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fellahconnect-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    depends_on:
      - postgres
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - fellah-network

volumes:
  postgres_data:

networks:
  fellah-network:
    driver: bridge
