services:
  postgres:
    image: postgres:16-alpine
    container_name: fellahconnect-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fellahconnect
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fellahconnect"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - fellah-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fellahconnect-api
    restart: unless-stopped
    working_dir: /usr/src/app
    ports:
      - "80:3000"
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev
    networks:
      - fellah-network

volumes:
  postgres_data:

networks:
  fellah-network:
    driver: bridge
